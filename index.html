<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voca Stable</title>

<style>
body{font-family:-apple-system;background:#2c5364;color:#fff;padding:10px}
.app{max-width:1000px;margin:auto}
input,button,select{padding:8px;border-radius:8px;border:none}
button{cursor:pointer}
</style>
</head>

<body>
<div class="app">

<h2>📘 Voca Stable</h2>

<input id="topicInput" placeholder="Topic"><br><br>

<div id="tabs"></div>

<select id="filter" onchange="renderList()">
<option value="">-- Bộ lọc --</option>
<option value="length">Số nét</option>
<option value="date">Ngày</option>
</select>

<br><br>

<input id="word" placeholder="Từ">
<input id="phonetic" placeholder="Phiên âm">
<input id="meaning" placeholder="Nghĩa">
<button onclick="addWord()">Thêm</button>

<table border="1" width="100%">
<tbody id="list"></tbody>
</table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyAFQmjy1RkMe_xhbFScVLAIYu-VOrM5gtw",
authDomain:"voca-web-9a1e7.firebaseapp.com",
projectId:"voca-web-9a1e7"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let currentPage=1;
let cache=[];

/* Load */
async function loadData(){
const doc=await db.collection("voca").doc("page_"+currentPage).get();
cache=doc.exists?doc.data().items||[]:[];
}

/* Save */
async function saveData(){
await db.collection("voca").doc("page_"+currentPage).set({items:cache});
}

/* Render */
function renderList(){
let data=[...cache];

const f=document.getElementById("filter").value;
if(f==="length") data.sort((a,b)=>a.word.length-b.word.length);
if(f==="date") data.sort((a,b)=>b.time-a.time);

list.innerHTML="";
data.forEach((item,i)=>{
list.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${item.word}</td>
<td>${item.meaning}</td>
<td>
<button onclick="editWord('${item.id}')">Sửa</button>
<button onclick="deleteWord('${item.id}')">Xóa</button>
</td>
</tr>`;
});
}

/* Add */
async function addWord(){
const w=word.value.trim();
const m=meaning.value.trim();
if(!w||!m)return;

if(cache.some(i=>i.word.toLowerCase()===w.toLowerCase())){
alert("Trùng từ");return;
}

cache.push({id:Date.now()+"",word:w,phonetic:"",meaning:m,time:Date.now()});
await saveData();
renderList();
}

/* Delete */
async function deleteWord(id){
cache=cache.filter(i=>i.id!==id);
await saveData();
renderList();
}

/* Edit */
async function editWord(id){
const item=cache.find(i=>i.id===id);
const w=prompt("Từ:",item.word);
const m=prompt("Nghĩa:",item.meaning);

if(w&&m){
item.word=w;item.meaning=m;
await saveData();
renderList();
}
}

/* Init */
async function init(){
await loadData();
renderList();
}
init();
</script>

</body>
</html>
